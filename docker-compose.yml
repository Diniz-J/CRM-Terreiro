version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: terreiro-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: terreiro_crm
      MYSQL_USER: terreiro_user
      MYSQL_PASSWORD: terreiro_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      timeout: 5s
      retries: 10
      interval: 10s

volumes:
  mysql_data: